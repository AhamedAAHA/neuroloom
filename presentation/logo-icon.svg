<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Neuroloom">
  <defs>
    <linearGradient id="nl-bg" x1="8" y1="4" x2="56" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff6b6b"/>
      <stop offset="0.55" stop-color="#ff8e8e"/>
      <stop offset="1" stop-color="#4ecdc4"/>
    </linearGradient>
    <linearGradient id="nl-strand-a" x1="18" y1="12" x2="46" y2="52" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="nl-strand-b" x1="46" y1="12" x2="18" y2="52" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.35"/>
    </linearGradient>
    <filter id="nl-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="16" fill="url(#nl-bg)"/>
  <rect x="1" y="1" width="62" height="62" rx="15" stroke="#ffffff" stroke-opacity="0.12"/>
  <!-- DNA helix + neural node -->
  <g filter="url(#nl-glow)">
    <path d="M22 14 C22 22, 42 22, 42 30 C42 38, 22 38, 22 46" stroke="url(#nl-strand-a)" stroke-width="3.2" stroke-linecap="round" fill="none"/>
    <path d="M42 14 C42 22, 22 22, 22 30 C22 38, 42 38, 42 46" stroke="url(#nl-strand-b)" stroke-width="3.2" stroke-linecap="round" fill="none"/>
    <line x1="24" y1="20" x2="40" y2="20" stroke="#fff" stroke-opacity="0.45" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="24" y1="30" x2="40" y2="30" stroke="#fff" stroke-opacity="0.55" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="24" y1="40" x2="40" y2="40" stroke="#fff" stroke-opacity="0.45" stroke-width="1.6" stroke-linecap="round"/>
    <circle cx="32" cy="30" r="4.5" fill="#fff"/>
    <circle cx="32" cy="30" r="2" fill="#4ecdc4"/>
  </g>
</svg>
